databases:
  - name: grocery-db
    plan: free
    databaseName: grocery_list

services:
  - type: web
    name: grocery-list
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: grocery-db
          property: connectionString
