<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery List</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }

    .header {
      background: #2d6a4f;
      color: white;
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }

    .tab {
      padding: 8px 10px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      text-align: center;
    }

    .tab:hover { background: rgba(255,255,255,0.25); }
    .tab.active { background: white; color: #2d6a4f; font-weight: 600; }

    .tab.central-tab {
      grid-column: 1 / -1;
      font-size: 14px;
      padding: 10px;
      font-weight: 600;
      background: rgba(255,255,255,0.25);
    }

    .tab.central-tab.active {
      background: white;
    }

    .add-form {
      padding: 16px 20px;
      background: white;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .add-form .inputs {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .add-form input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-form input:focus { border-color: #2d6a4f; }

    .add-form input.note-input {
      font-size: 13px;
      padding: 8px 12px;
      color: #666;
    }

    .add-btn {
      padding: 10px 18px;
      background: #2d6a4f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1px;
      white-space: nowrap;
    }

    .add-btn:hover { background: #1b4332; }
    .add-btn:active { transform: scale(0.97); }

    .list-container {
      padding: 8px 12px 100px;
    }

    .item {
      background: white;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      transition: opacity 0.2s;
    }

    .item.bought { opacity: 0.5; }

    .item .check {
      width: 24px;
      height: 24px;
      border: 2px solid #ccc;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .item.bought .check {
      background: #2d6a4f;
      border-color: #2d6a4f;
    }

    .item.bought .check::after {
      content: '✓';
      color: white;
      font-size: 14px;
      font-weight: bold;
    }

    .item .details { flex: 1; min-width: 0; }

    .item .item-name {
      font-size: 15px;
      font-weight: 500;
      word-break: break-word;
    }

    .item.bought .item-name {
      text-decoration: line-through;
      color: #999;
    }

    .item .item-note {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
      word-break: break-word;
    }

    .item .item-date {
      font-size: 11px;
      color: #bbb;
      margin-top: 2px;
    }

    .item .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      flex-shrink: 0;
    }

    .item .delete-btn:hover { color: #e74c3c; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 15px;
    }

    .clear-bought {
      display: block;
      margin: 16px auto;
      padding: 10px 20px;
      background: none;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      color: #888;
      font-size: 13px;
      cursor: pointer;
    }

    .clear-bought:hover { border-color: #e74c3c; color: #e74c3c; }

    .badge {
      background: rgba(255,255,255,0.3);
      color: white;
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 10px;
      margin-left: 4px;
    }

    .tab.active .badge {
      background: #2d6a4f;
      color: white;
    }

    .item .item-household {
      font-size: 11px;
      color: #2d6a4f;
      font-weight: 600;
      margin-top: 2px;
    }

    .add-form select {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      color: #666;
      background: white;
      transition: border-color 0.2s;
    }

    .add-form select:focus { border-color: #2d6a4f; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Grocery List</h1>
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="add-form">
    <div class="inputs">
      <input type="text" id="itemInput" placeholder="Add a grocery item..." autofocus>
      <input type="text" id="noteInput" class="note-input" placeholder="Note (optional)">
      <select id="householdSelect" style="display:none;">
        <option value="Ambattur (Sheila)">Ambattur (Sheila)</option>
        <option value="Ambattur (Hamsa)">Ambattur (Hamsa)</option>
        <option value="Brownstone">Brownstone</option>
      </select>
    </div>
    <button class="add-btn" id="addBtn">Add</button>
  </div>

  <div class="list-container" id="listContainer"></div>

  <script>
    const LISTS = ['Ambattur (Sheila)', 'Ambattur (Hamsa)', 'Brownstone'];
    const ALL_TABS = ['Central', ...LISTS];
    let currentList = localStorage.getItem('primaryList') || 'Central';
    let data = {};

    const tabsEl = document.getElementById('tabs');
    const itemInput = document.getElementById('itemInput');
    const noteInput = document.getElementById('noteInput');
    const householdSelect = document.getElementById('householdSelect');
    const addBtn = document.getElementById('addBtn');
    const listContainer = document.getElementById('listContainer');

    function renderTabs() {
      tabsEl.innerHTML = ALL_TABS.map(name => {
        let count;
        if (name === 'Central') {
          count = LISTS.reduce((sum, l) => sum + (data[l] || []).filter(i => !i.bought).length, 0);
        } else {
          count = (data[name] || []).filter(i => !i.bought).length;
        }
        const badge = count > 0 ? `<span class="badge">${count}</span>` : '';
        const cls = `tab ${name === 'Central' ? 'central-tab' : ''} ${name === currentList ? 'active' : ''}`;
        return `<button class="${cls}" data-list="${name}">${name}${badge}</button>`;
      }).join('');

      // Show/hide household dropdown
      householdSelect.style.display = currentList === 'Central' ? 'block' : 'none';
    }

    function renderList() {
      let items;
      if (currentList === 'Central') {
        // Combine all lists, tagging each item with its household
        items = [];
        for (const listName of LISTS) {
          for (const item of (data[listName] || [])) {
            items.push({ ...item, _listName: listName });
          }
        }
      } else {
        items = (data[currentList] || []).map(i => ({ ...i, _listName: currentList }));
      }

      if (items.length === 0) {
        listContainer.innerHTML = '<div class="empty-state">No items yet. Add something above!</div>';
        return;
      }

      const pending = items.filter(i => !i.bought);
      const bought = items.filter(i => i.bought);
      const sorted = [...pending, ...bought];

      let html = sorted.map(item => `
        <div class="item ${item.bought ? 'bought' : ''}" data-id="${item.id}" data-list="${item._listName}">
          <div class="check" onclick="toggleBought('${item.id}', '${item._listName}')"></div>
          <div class="details">
            <div class="item-name">${escapeHtml(item.item)}</div>
            ${item.note ? `<div class="item-note">${escapeHtml(item.note)}</div>` : ''}
            ${currentList === 'Central' ? `<div class="item-household">${escapeHtml(item._listName)}</div>` : ''}
            <div class="item-date">${formatDate(item.addedAt)}</div>
          </div>
          <button class="delete-btn" onclick="deleteItem('${item.id}', '${item._listName}')">&times;</button>
        </div>
      `).join('');

      if (bought.length > 0) {
        html += `<button class="clear-bought" onclick="clearBought()">Clear ${bought.length} bought item${bought.length > 1 ? 's' : ''}</button>`;
      }

      listContainer.innerHTML = html;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      const now = new Date();
      const isToday = d.toDateString() === now.toDateString();
      const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
      const isYesterday = d.toDateString() === yesterday.toDateString();
      const time = d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
      if (isToday) return `Today, ${time}`;
      if (isYesterday) return `Yesterday, ${time}`;
      return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }) + `, ${time}`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    let lastDataJSON = '';
    let actionInFlight = false;

    async function fetchData(force) {
      if (actionInFlight && !force) return;
      try {
        const res = await fetch('/api/lists');
        const newData = await res.json();
        const newJSON = JSON.stringify(newData);
        if (newJSON !== lastDataJSON) {
          lastDataJSON = newJSON;
          data = newData;
          renderTabs();
          renderList();
        }
      } catch (e) { /* ignore network errors during poll */ }
    }

    function getTargetList() {
      if (currentList === 'Central') return householdSelect.value;
      return currentList;
    }

    function syncAfter(promise) {
      actionInFlight = true;
      promise.then(() => {
        actionInFlight = false;
        fetchData(true);
      }).catch(() => { actionInFlight = false; });
    }

    async function addItem() {
      const item = itemInput.value.trim();
      if (!item) return;

      const note = noteInput.value.trim();
      const targetList = getTargetList();

      // Optimistic: update UI instantly
      const tempId = Date.now().toString();
      if (!data[targetList]) data[targetList] = [];
      data[targetList].push({ id: tempId, item, note, bought: false, addedAt: new Date().toISOString() });
      lastDataJSON = '';
      renderTabs();
      renderList();

      itemInput.value = '';
      noteInput.value = '';
      itemInput.focus();

      syncAfter(fetch(`/api/lists/${encodeURIComponent(targetList)}/items`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ item, note })
      }));
    }

    async function toggleBought(itemId, listName) {
      const targetList = listName || currentList;
      const items = data[targetList] || [];
      const item = items.find(i => i.id === itemId);
      if (item) { item.bought = !item.bought; lastDataJSON = ''; renderTabs(); renderList(); }

      syncAfter(fetch(`/api/lists/${encodeURIComponent(targetList)}/items/${itemId}`, {
        method: 'PATCH'
      }));
    }

    async function deleteItem(itemId, listName) {
      const targetList = listName || currentList;
      if (data[targetList]) {
        data[targetList] = data[targetList].filter(i => i.id !== itemId);
        lastDataJSON = '';
        renderTabs(); renderList();
      }

      syncAfter(fetch(`/api/lists/${encodeURIComponent(targetList)}/items/${itemId}`, {
        method: 'DELETE'
      }));
    }

    async function clearBought() {
      if (currentList === 'Central') {
        for (const listName of LISTS) {
          if (data[listName]) data[listName] = data[listName].filter(i => !i.bought);
        }
        lastDataJSON = '';
        renderTabs(); renderList();
        syncAfter(Promise.all(LISTS.map(l =>
          fetch(`/api/lists/${encodeURIComponent(l)}/clear-bought`, { method: 'POST' })
        )));
      } else {
        if (data[currentList]) {
          data[currentList] = data[currentList].filter(i => !i.bought);
          lastDataJSON = '';
          renderTabs(); renderList();
        }
        syncAfter(fetch(`/api/lists/${encodeURIComponent(currentList)}/clear-bought`, {
          method: 'POST'
        }));
      }
    }

    // Tab switching
    tabsEl.addEventListener('click', (e) => {
      const tab = e.target.closest('.tab');
      if (!tab) return;
      currentList = tab.dataset.list;
      localStorage.setItem('primaryList', currentList);
      renderTabs();
      renderList();
    });

    // Add on button click or Enter
    addBtn.addEventListener('click', addItem);
    itemInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addItem();
    });
    noteInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addItem();
    });

    // Poll for updates every 5 seconds (so family members see each other's changes)
    fetchData();
    setInterval(fetchData, 5000);
  </script>
</body>
</html>
